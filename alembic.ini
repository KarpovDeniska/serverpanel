[alembic]
script_location = alembic
prepend_sys_path = src
# Explicitly set the path separator to silence the DeprecationWarning:
# alembic 1.14+ wants the key present so the legacy space/comma/colon
# splitting is no longer used as a fallback.
path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///./data/serverpanel.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
