name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        env:
          DEBUG: "true"
          SECRET_KEY: ci-secret-not-for-production
          ENCRYPTION_KEY: m9x2p3MqV3IY0vZvS1ZAAabSwyh1C4Md8zZKHSv_r64=
        run: pytest -q
